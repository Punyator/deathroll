<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxDown Deathroll</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00C37A;--gd:#009960;--gp:rgba(0,195,122,0.12);--gb:rgba(0,195,122,0.3);
  --bg:#0a0a0f;--s1:#111118;--s2:#1a1a24;--s3:#252530;--s4:#2e2e3c;
  --t1:#f0ede8;--t2:#8a8a9a;--t3:#444455;
  --red:#e53935;--gold:#ffd600;--r:14px;
}
html,body{min-height:100vh;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1)}
body{display:flex;flex-direction:column;align-items:center}

header{width:100%;background:var(--s1);border-bottom:1px solid var(--s3);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:9px}
.logo svg{width:30px;height:30px}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--g)}
.hbadge{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--g);background:var(--gp);border:1px solid var(--gb);border-radius:20px;padding:3px 10px}

main{width:100%;max-width:520px;padding:20px 16px 48px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:20px}
.card-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:5px}
.card-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:18px;line-height:1.55}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fgroup{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t2)}
input{background:var(--s2);border:1px solid var(--s3);border-radius:9px;padding:10px 13px;font-size:14px;font-family:'Inter',sans-serif;color:var(--t1);outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--g)}
.inp-lg{font-size:22px!important;font-weight:700!important;color:var(--g)!important;text-align:center;letter-spacing:1px}
.inp-code{font-size:20px!important;font-weight:700!important;color:var(--g)!important;text-align:center;letter-spacing:4px;text-transform:uppercase}

.btn{display:block;width:100%;border:none;border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s,background .15s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-g{background:var(--g);color:#000}
.btn-g:hover:not(:disabled){background:var(--gd)}
.btn-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--s3);font-size:13px;padding:10px 16px;width:auto}
.btn-ghost:hover{background:var(--s3)}
.brow{display:flex;gap:9px;align-items:center}
.brow .btn-g{flex:1}

/* ── ROLL BUTTON FIXED BAR ── */
.roll-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:12px 16px 20px;background:linear-gradient(transparent, var(--bg) 35%);display:flex;justify-content:center}
.roll-bar-inner{width:100%;max-width:520px;display:flex;gap:9px;align-items:center}
.btn-roll{flex:1;border:none;border-radius:14px;padding:17px 16px;font-family:'Inter',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:transform .1s,background .15s,opacity .15s,box-shadow .15s;background:var(--g);color:#000;box-shadow:0 4px 24px rgba(0,195,122,0.35)}
.btn-roll:active{transform:scale(.96)}
.btn-roll:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;background:var(--s3);color:var(--t2)}
.btn-roll:not(:disabled):hover{background:var(--gd);box-shadow:0 6px 32px rgba(0,195,122,0.5)}
.game-bottom-pad{height:80px}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--t3);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--s3)}

/* ── PLAYERS LIST (lobby + scoreboard) ── */
.players-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.player-row{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--s3);border-radius:9px;padding:9px 13px;transition:background .2s,border-color .2s}
.player-row.active-turn{background:rgba(0,195,122,.09);border-color:var(--gb)}
.player-row.eliminated{opacity:.45}
.player-avatar{width:30px;height:30px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700;color:var(--g)}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-status{font-size:10px;color:var(--t2);margin-top:1px}
.player-wins{font-size:11px;font-weight:700;color:var(--gold);margin-left:auto;flex-shrink:0}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g);margin-right:5px;vertical-align:middle;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── ARENA ── */
.arena{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:22px 18px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px}
.turn-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2)}

.dscene{width:88px;height:88px;perspective:280px;margin:0 auto}
.d3{width:70px;height:70px;position:relative;transform-style:preserve-3d;transform:rotateX(20deg) rotateY(30deg);margin:9px auto}
.d3.roll{animation:tumble .75s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes tumble{
  0%  {transform:rotateX(0)      rotateY(0)      rotateZ(0)}
  30% {transform:rotateX(240deg) rotateY(150deg) rotateZ(90deg)}
  65% {transform:rotateX(520deg) rotateY(350deg) rotateZ(220deg)}
  100%{transform:rotateX(720deg) rotateY(450deg) rotateZ(360deg)}
}
.dface{position:absolute;width:70px;height:70px;background:#fff;border:2.5px solid #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;padding:9px;gap:3px}
.dface.fr{transform:translateZ(35px)}
.dface.bk{transform:rotateY(180deg) translateZ(35px)}
.dface.ri{transform:rotateY(90deg) translateZ(35px)}
.dface.le{transform:rotateY(-90deg) translateZ(35px)}
.dface.tp{transform:rotateX(90deg) translateZ(35px)}
.dface.bo{transform:rotateX(-90deg) translateZ(35px)}
.dp{width:11px;height:11px;background:#111;border-radius:50%;flex-shrink:0}
.f1{justify-content:center;align-items:center}
.f2{display:flex;justify-content:space-between;align-items:center;padding:12px}
.f2 .dp:first-child{align-self:flex-start}
.f2 .dp:last-child{align-self:flex-end}
.f3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:3px;align-items:center;justify-items:center}
.f4{display:grid;grid-template-columns:1fr 1fr;gap:4px;align-items:center;justify-items:center}
.f5{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:3px;align-items:center;justify-items:center}
.f6{display:grid;grid-template-columns:1fr 1fr;gap:3px;align-items:center;justify-items:center}

/* ── BIG NUMBER (más visible) ── */
.bignum-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.bignum{font-size:80px;font-weight:700;line-height:1;color:var(--g);letter-spacing:-3px;text-shadow:0 0 40px rgba(0,195,122,0.4)}
.bignum.pop{animation:npop .4s ease-out}
@keyframes npop{0%{transform:scale(1.35);color:#fff;text-shadow:0 0 60px #fff}60%{transform:scale(.92)}100%{transform:scale(1);color:var(--g);text-shadow:0 0 40px rgba(0,195,122,0.4)}}
.rhint{font-size:13px;color:var(--t2);background:var(--s2);border-radius:20px;padding:4px 14px}
.rhint strong{color:var(--t1);font-size:15px}

/* ── ROLL HISTORY (visible) ── */
.roll-history{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:4px 0}
.roll-chip{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:5px 10px;font-size:13px;font-weight:700;border:1px solid transparent}
.roll-chip.safe{background:rgba(0,195,122,.12);border-color:rgba(0,195,122,.25);color:var(--g)}
.roll-chip.danger{background:rgba(229,57,53,.12);border-color:rgba(229,57,53,.3);color:var(--red)}
.roll-chip.dead{background:var(--red);color:#fff}
.roll-chip .chip-name{font-size:10px;font-weight:600;color:inherit;opacity:.75;margin-right:2px}

/* ── LOG ── */
.log{background:#09090d;border:1px solid var(--s3);border-radius:9px;padding:9px 13px;max-height:120px;overflow-y:auto;font-size:12px;line-height:1.85;color:var(--t2);scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.log::-webkit-scrollbar{width:4px}
.log::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.le{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0}
.le:last-child{border-bottom:none}
.le.hi{color:var(--t1)}
.le.kl{color:var(--red);font-weight:600}
.le.wn{color:var(--g);font-weight:600}

/* ── WINNER SCREEN ── */
.wscreen{text-align:center;padding:8px 0}
.wey{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:7px}
.wname{font-size:46px;font-weight:700;line-height:1;margin-bottom:5px;animation:win-in .5s ease-out}
@keyframes win-in{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.wloser{font-size:13px;color:var(--t2);margin-bottom:20px}
.wloser strong{color:var(--red)}
.wbtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.wbtn{background:var(--g);color:#000;border:none;border-radius:10px;padding:12px 26px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s}
.wbtn:hover{background:var(--gd)}
.wbtn:active{transform:scale(.97)}

/* ── WAITING ── */
.waiting{text-align:center;padding:16px 0}
.wait-spinner{font-size:40px;display:block;margin-bottom:12px}
.wait-spinner.spin{animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.wait-title{font-size:17px;font-weight:700;margin-bottom:6px}
.wait-sub{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.6}
.code-box{font-size:32px;font-weight:700;letter-spacing:6px;color:var(--g);background:var(--s2);border:1px solid var(--gb);border-radius:11px;padding:14px 22px;display:inline-block;cursor:pointer;user-select:all;margin-bottom:10px;transition:background .15s}
.code-box:hover{background:rgba(0,195,122,.1)}
.code-tip{font-size:11px;color:var(--t3);margin-bottom:12px}
.share-box{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--gb);border-radius:11px;padding:10px 14px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.share-box:hover{background:rgba(0,195,122,.1)}
.share-url{font-size:12px;font-weight:600;color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.share-icon{font-size:18px;flex-shrink:0}
.share-tip{font-size:11px;color:var(--t3);margin-bottom:12px}
.lobby-players{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px}
.lobby-pip{background:var(--s2);border:1px solid var(--s3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--t2)}
.lobby-pip.me{color:var(--g);border-color:var(--gb)}
.lobby-pip.ready{color:var(--t1)}
.start-hint{font-size:12px;color:var(--t3);margin-bottom:8px}

.sbar{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:2px 2px 0}
.online-pill{display:flex;align-items:center;gap:5px;color:var(--g);font-weight:600}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1.1s ease-in-out infinite}
.room-lbl{color:var(--t3);letter-spacing:1px;font-weight:500}

.conn-status{font-size:11px;color:var(--t3);text-align:center;padding:2px 0;min-height:22px}
.conn-status.ok{color:var(--g)}
.conn-status.err{color:var(--red);font-size:12px}

/* ── BATTERY ── */
.batt-wrap{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);padding:16px 18px}
.batt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.batt-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t2)}
.batt-pct{font-size:13px;font-weight:700;color:var(--t1);transition:color .4s;font-variant-numeric:tabular-nums}
.batt-body{display:flex;align-items:center;gap:8px}
.batt-shell{flex:1;height:40px;background:var(--s2);border:2px solid var(--s3);border-radius:8px;overflow:hidden;position:relative}
.batt-fill{height:100%;border-radius:6px 0 0 6px;transition:width .8s cubic-bezier(.4,0,.2,1),background .6s ease;position:relative;will-change:width}
.batt-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.13);border-radius:6px 0 0 0;pointer-events:none}
.batt-fill.flash{animation:batt-flash .6s ease-out}
@keyframes batt-flash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
.batt-fill.critical{animation:batt-critical 1s ease-in-out infinite}
@keyframes batt-critical{0%,100%{opacity:1}50%{opacity:.4}}
.batt-nub{width:8px;height:20px;background:var(--s3);border-radius:0 4px 4px 0;margin-left:-2px;flex-shrink:0}
.batt-segs{position:absolute;inset:0;display:flex;pointer-events:none}
.batt-seg{flex:1;border-right:1px solid rgba(0,0,0,.25)}
.batt-seg:last-child{border-right:none}
.batt-foot{display:flex;justify-content:space-between;margin-top:7px;font-size:10px;color:var(--t3)}
.batt-icon{font-size:20px;flex-shrink:0}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--s4);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--t1);display:none;z-index:999;text-align:center;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#toast.show{display:block;animation:tin .3s ease-out}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:420px){
  .bignum{font-size:64px}
  .wname{font-size:36px}
  main{padding:14px 12px 40px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 30 30" fill="none">
      <rect width="30" height="30" rx="7" fill="#00C37A"/>
      <path d="M7 11h16M12 11v9M18 11v9" stroke="#000" stroke-width="2.3" stroke-linecap="round"/>
      <path d="M10 16l5 5 5-5" stroke="#000" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text">Deathroll <span>TaxDown</span></div>
  </div>
  <div class="hbadge">Deathroll</div>
</header>

<main id="app"></main>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// TURN SERVER
const TURN_USER = 'openrelayproject';
const TURN_PASS = 'openrelayproject';

// ICE servers: STUN + multiple TURN providers for corporate networks
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
  // Metered TURN (reliable free tier)
  { urls: 'turn:relay1.expressturn.com:3478', username: 'efHUTNMOYTSEMPHBNN', credential: 'cUBMIYkbRm0zMrLz' },
  // OpenRelay fallback
  { urls: 'turn:openrelay.metered.ca:80',               username: TURN_USER, credential: TURN_PASS },
  { urls: 'turn:openrelay.metered.ca:443',              username: TURN_USER, credential: TURN_PASS },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp',username: TURN_USER, credential: TURN_PASS },
  { urls: 'turns:openrelay.metered.ca:443',             username: TURN_USER, credential: TURN_PASS },
];
// ════════════════════════════════════════════

// ── URL HELPERS ────────────────────────────────
function getCodeFromURL() {
  const p = new URLSearchParams(window.location.search);
  return (p.get('sala') || '').toUpperCase().slice(0, 5);
}
function setURLCode(code) {
  const url = new URL(window.location.href);
  if (code) url.searchParams.set('sala', code);
  else url.searchParams.delete('sala');
  history.replaceState(null, '', url.toString());
}
function getRoomShareURL(code) {
  const url = new URL(window.location.href);
  url.searchParams.set('sala', code);
  return url.toString();
}

// ── STATE ──────────────────────────────────────
// myRole: 'host' | 'guest'
// G.players: [{ id, name, wins, eliminated }]
// G.turn: index into players array (only alive players take turns)
// G.phase: 'wait' | 'game' | 'winner'
let peer = null;
let conns = {};       // host keeps: { peerId: conn }
let hostConn = null;  // guest keeps single conn to host
let myRole = null;
let myName = '';
let myPeerId = null;
let roomCode = null;
let G = null;
let peerReady = false;
let pendingJoinCode = null; // set when arriving via share link, waiting for name

// ── HELPERS ────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, dur=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function genCode() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

function myPlayer() {
  if (!G) return null;
  return G.players.find(p => p.id === myPeerId);
}

function currentTurnPlayer() {
  if (!G) return null;
  return G.players[G.turnIdx] || null;
}

function isMyTurn() {
  const cp = currentTurnPlayer();
  return cp && cp.id === myPeerId;
}

function alivePlayers() {
  return (G.players || []).filter(p => !p.eliminated);
}

// ── RENDER ─────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (pendingJoinCode)        { app.innerHTML = joinNameHTML(); return; }
  if (!roomCode)              { app.innerHTML = setupHTML();   return; }
  if (!G || G.phase==='wait') { app.innerHTML = waitingHTML(); return; }
  if (G.phase==='game')       { app.innerHTML = gameHTML(); renderBattery(); return; }
  if (G.phase==='winner')     { app.innerHTML = winnerHTML(); return; }
}

// ── JOIN-VIA-LINK NAME SCREEN ──────────────────
function joinNameHTML() {
  return `
  <div class="card">
    <div class="card-title">🎲 Deathroll</div>
    <div class="card-sub">Te han invitado a la sala <strong style="color:var(--g);letter-spacing:2px">${esc(pendingJoinCode)}</strong>.<br>¿Cómo quieres aparecer en la partida?</div>
    <div class="fgroup" style="margin-bottom:18px">
      <div class="flabel">Tu nombre</div>
      <input id="myname" type="text" maxlength="16" placeholder="¿Cómo te llamas?"
        onkeydown="if(event.key==='Enter') confirmJoinName()" autofocus />
    </div>
    <button class="btn btn-g" onclick="confirmJoinName()">Unirse a la sala →</button>
    <div style="margin-top:10px;text-align:center">
      <button class="btn btn-ghost" style="width:auto;margin:0 auto" onclick="cancelJoin()">Cancelar</button>
    </div>
  </div>`;
}

function confirmJoinName() {
  const name = (document.getElementById('myname').value.trim() || 'Jugador').slice(0, 16);
  const code = pendingJoinCode;
  pendingJoinCode = null;
  myName = name; myRole = 'guest'; roomCode = code;
  G = { phase:'wait', players:[], log:[] };
  render();

  // Connection timeout — show error after 15s if still not connected
  const connTimeout = setTimeout(() => {
    const st = document.getElementById('connstatus');
    if (st && st.textContent !== '¡Conectado!') {
      st.innerHTML = '❌ No se pudo conectar. ¿Red de empresa o VPN? <button onclick="retryJoin()" style="margin-left:8px;padding:4px 10px;border-radius:6px;border:none;background:var(--g);color:#000;font-weight:700;cursor:pointer">Reintentar</button>';
      st.className = 'conn-status err';
    }
  }, 15000);
  window._connTimeout = connTimeout;

  (async () => {
    try {
      peer = await initPeer(null);
    } catch(e) {
      clearTimeout(connTimeout);
      const st = document.getElementById('connstatus');
      if (st) {
        st.innerHTML = '❌ Sin conexión. ¿Red de empresa o VPN? <button onclick="retryJoin()" style="margin-left:8px;padding:4px 10px;border-radius:6px;border:none;background:var(--g);color:#000;font-weight:700;cursor:pointer">Reintentar</button>';
        st.className = 'conn-status err';
      }
      return;
    }
    const c = peer.connect('td-' + code, { reliable:true });
    hostConn = c;
    c.on('open', () => {
      clearTimeout(connTimeout);
      const st = document.getElementById('connstatus');
      if (st) { st.textContent = '¡Conectado!'; st.className='conn-status ok'; }
      c.send({ type:'join', name });
    });
    c.on('data', msg => guestOnMessage(msg));
    c.on('close', () => {
      if (G && G.phase !== 'wait') toast('⚠️ El host se ha desconectado');
    });
    c.on('error', () => {
      clearTimeout(connTimeout);
      const st = document.getElementById('connstatus');
      if (st) {
        st.innerHTML = '❌ Sala no encontrada o sin conexión. <button onclick="retryJoin()" style="margin-left:8px;padding:4px 10px;border-radius:6px;border:none;background:var(--g);color:#000;font-weight:700;cursor:pointer">Reintentar</button>';
        st.className = 'conn-status err';
      }
    });
  })();
}

  clearTimeout(window._connTimeout);

  hostConn=null; roomCode=null; myRole=null; G=null; peerReady=false; myPeerId=null;

// ── PEER SETUP ─────────────────────────────────
function initPeer(id) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, {
      debug: 0,
      config: { iceServers: ICE_SERVERS }
    });
    p.on('open', id => { peerReady=true; myPeerId=id; resolve(p); });
    p.on('error', e => reject(e));
    setTimeout(()=>reject(new Error('timeout')), 15000);
  });
}

// Host: broadcast state to all guests
function broadcast(msg) {
  Object.values(conns).forEach(c => { if (c && c.open) c.send(msg); });
}

// Guest: send to host
function sendToHost(msg) {
  if (hostConn && hostConn.open) hostConn.send(msg);
}

// Host handles incoming guest messages
function hostOnMessage(guestPeerId, msg) {
  if (msg.type === 'join') {
    if (G.phase !== 'wait') {
      // game already started, reject
      const c = conns[guestPeerId];
      if (c) c.send({ type:'rejected', reason:'La partida ya ha empezado.' });
      return;
    }
    if (G.players.length >= 8) {
      const c = conns[guestPeerId];
      if (c) c.send({ type:'rejected', reason:'La sala está llena (máx. 8).' });
      return;
    }
    G.players.push({ id: guestPeerId, name: msg.name, wins: 0, eliminated: false });
    G.log.unshift({ t:`${msg.name} se ha unido a la sala.`, c:'hi' });
    // send full state to everyone
    broadcast({ type:'state', state: G });
    render();
  }
  if (msg.type === 'roll') {
    // Only accept roll from whoever's turn it is
    const cp = currentTurnPlayer();
    if (!cp || cp.id !== guestPeerId) return;
    processRoll(guestPeerId, msg.value);
  }
}

// Guest handles incoming host messages
function guestOnMessage(msg) {
  if (msg.type === 'rejected') {
    toast('No puedes unirte: ' + msg.reason);
    leaveRoom();
    return;
  }
  if (msg.type === 'state') {
    const wasMyTurn = G && isMyTurn();
    G = msg.state;
    render();
    if (!wasMyTurn && isMyTurn() && G.phase==='game') {
      setTimeout(()=>{ animateDice(); animatePop(); renderBattery(true); }, 80);
    }
    if (G.phase==='game') setTimeout(()=>animatePop(),80);
  }
}

// ── GAME LOGIC (runs on host) ───────────────────
function processRoll(rollerId, value) {
  const rollerP = G.players.find(p => p.id === rollerId);
  if (!rollerP) return;

  G.rollHistory = G.rollHistory || [];
  G.rollHistory.push({ name: rollerP.name, value });

  if (value === 1) {
    rollerP.eliminated = true;
    G.log.unshift({ t:`💀 ${rollerP.name} sacó 1. ¡ELIMINADO!`, c:'kl' });
    G.loserId = rollerId;

    const alive = alivePlayers();
    if (alive.length === 1) {
      // one player left = winner
      const winner = alive[0];
      winner.wins = (winner.wins||0) + 1;
      G.winnerId = winner.id;
      G.phase = 'winner';
    } else {
      // reset to starting number for the next round
      G.current = G.startNum;
      G.log.unshift({ t:`↺ Reset a ${G.startNum}. Empieza ${nextAliveName(rollerId)}.`, c:'hi' });
      advanceTurn(rollerId);
    }
  } else {
    G.log.unshift({ t:`${rollerP.name} sacó ${value} (máx. ${G.current}).` });
    G.current = value;
    advanceTurn(rollerId);
  }

  broadcast({ type:'state', state: G });
  render();
  setTimeout(()=>{ animateDice(); animatePop(); renderBattery(true); }, 200);
}

function advanceTurn(currentRollerId) {
  const alive = alivePlayers();
  if (!alive.length) return;
  const currentAliveIdx = alive.findIndex(p => p.id === currentRollerId);
  const nextIdx = (currentAliveIdx + 1) % alive.length;
  // find the global index of that player
  G.turnIdx = G.players.indexOf(alive[nextIdx]);
}

function nextAliveName(afterId) {
  const alive = alivePlayers();
  const idx = alive.findIndex(p => p.id === afterId);
  return alive[(idx+1) % alive.length]?.name || '?';
}

// ── ACTIONS ────────────────────────────────────
async function createRoom() {
  const name = (document.getElementById('myname').value.trim()||'Jugador 1').slice(0,16);
  const n    = Math.max(10, Math.min(99999, parseInt(document.getElementById('startnum').value)||1000));
  myName = name; myRole = 'host';
  roomCode = genCode();
  setURLCode(roomCode);

  try {
    peer = await initPeer('td-' + roomCode);
  } catch(e) {
    toast('Error de conexión. Comprueba tu red e inténtalo de nuevo.'); setURLCode(null); return;
  }

  // host is player 0
  G = {
    phase: 'wait',
    startNum: n, current: n,
    players: [{ id: myPeerId, name, wins: 0, eliminated: false }],
    turnIdx: 0,
    log: [], rollHistory: [],
    winnerId: null, loserId: null
  };

  peer.on('connection', c => {
    const gid = c.peer;
    conns[gid] = c;
    c.on('open', () => {
      const st = document.getElementById('connstatus');
      if (st) { st.textContent = `${Object.keys(conns).length} conectado(s)`; st.className='conn-status ok'; }
    });
    c.on('data', msg => hostOnMessage(gid, msg));
    c.on('close', () => {
      delete conns[gid];
      if (G) {
        const p = G.players.find(x => x.id === gid);
        if (p) { toast(`⚠️ ${p.name} se ha desconectado`); }
      }
    });
    c.on('error', e => toast('Error de conexión: ' + e.message));
  });

  render();
}

async function joinRoom() {
  const code = (document.getElementById('joincode').value||'').trim().toUpperCase();
  const name = (document.getElementById('myname').value.trim()||'Jugador').slice(0,16);
  if (!code||code.length!==5) { toast('Introduce un código de 5 letras'); return; }

  myName = name; myRole = 'guest'; roomCode = code;
  G = { phase:'wait', players:[], log:[] };
  render();

  try {
    peer = await initPeer(null);
  } catch(e) {
    toast('No se pudo conectar. Prueba con otra red o desactiva la VPN.'); leaveRoom(); return;
  }

  const c = peer.connect('td-' + code, { reliable:true });
  hostConn = c;
  c.on('open', () => {
    const st = document.getElementById('connstatus');
    if (st) { st.textContent = '¡Conectado!'; st.className='conn-status ok'; }
    c.send({ type:'join', name });
  });
  c.on('data', msg => guestOnMessage(msg));
  c.on('close', () => {
    if (G && G.phase !== 'wait') toast('⚠️ El host se ha desconectado');
  });
  c.on('error', () => {
    toast('No se encontró la sala. Verifica el código o pide al host que cree una nueva.'); leaveRoom();
  });
}

function startGame() {
  if (myRole !== 'host') return;
  if (!G || G.players.length < 2) { toast('Necesitas al menos 2 jugadores'); return; }
  // shuffle turn order
  const shuffled = [...G.players].sort(()=>Math.random()-.5);
  G.players = shuffled;
  G.turnIdx = 0;
  G.phase = 'game';
  G.log = [{ t:`¡Partida iniciada con ${G.players.length} jugadores! Empieza ${G.players[0].name}.`, c:'hi' }];
  G.rollHistory = [];
  broadcast({ type:'state', state: G });
  render();
}

function doRoll() {
  if (!isMyTurn()) return;
  const value = Math.floor(Math.random() * G.current) + 1;
  animateDice();

  if (myRole === 'host') {
    processRoll(myPeerId, value);
  } else {
    sendToHost({ type:'roll', value });
    // Optimistic: disable button until state comes back
    const btn = document.getElementById('rollbtn');
    if (btn) btn.disabled = true;
  }
}

function doRematch() {
  if (myRole !== 'host') return;
  G.phase = 'game';
  G.current = G.startNum;
  G.winnerId = null; G.loserId = null;
  G.rollHistory = [];
  // uneliminate everyone, shuffle turn order
  G.players.forEach(p => p.eliminated = false);
  G.players = [...G.players].sort(()=>Math.random()-.5);
  G.turnIdx = 0;
  G.log = [{ t:`¡Revancha! Empieza ${G.players[0].name} con ${G.startNum}.`, c:'hi' }];
  broadcast({ type:'state', state: G });
  render();
}

function leaveRoom() {
  Object.values(conns).forEach(c => { try{ c.close(); }catch(e){} });
  conns = {};
  if (hostConn) { try{ hostConn.close(); }catch(e){} hostConn = null; }
  if (peer) { peer.destroy(); peer=null; }
  roomCode=null; myRole=null; G=null; peerReady=false; myPeerId=null;
  pendingJoinCode=null;
  setURLCode(null);
  render();
}

// ── ANIMATIONS ─────────────────────────────────
function animateDice() {
  const d = document.getElementById('dice3d');
  if (d) { d.classList.remove('roll'); void d.offsetWidth; d.classList.add('roll'); }
}
function animatePop() {
  const bn = document.getElementById('bignum');
  if (bn) { bn.classList.remove('pop'); void bn.offsetWidth; bn.classList.add('pop'); }
}
function copyCode(el) {
  navigator.clipboard.writeText(roomCode).catch(()=>{});
  const orig = el.textContent; el.textContent = '¡Copiado!';
  setTimeout(()=>{ el.textContent=orig; }, 1300);
}
function copyShareLink(el) {
  const url = getRoomShareURL(roomCode);
  navigator.clipboard.writeText(url).catch(()=>{});
  const btn = el.querySelector('span:last-child');
  const orig = btn.textContent; btn.textContent = '¡Copiado!';
  setTimeout(()=>{ btn.textContent=orig; }, 1500);
}

// ── BATTERY ────────────────────────────────────
function renderBattery(flash) {
  requestAnimationFrame(() => {
    const fill = document.getElementById('battFill');
    const pct  = document.getElementById('battPct');
    const icon = document.getElementById('battIcon');
    if (!fill || !G) return;

    // Probability of rolling 1 = 1 / current number
    const prob    = 1 / G.current;
    // Show 1 decimal when below 10% for more precision
    const probPct = prob < 0.10
      ? (prob * 100).toFixed(1).replace(/\.0$/, '')
      : Math.round(prob * 100);

    // Bar = current number / starting number (how far the dice range has shrunk)
    const barWidth = Math.max(1, Math.round((G.current / G.startNum) * 100));
    let color;
    if      (barWidth > 66) color = '#00C37A';  // green  – early game
    else if (barWidth > 33) color = '#ffd600';  // yellow – mid game
    else if (barWidth > 10) color = '#ff8c00';  // orange – late game
    else                    color = '#e53935';  // red    – danger zone

    fill.style.transition = 'none';
    fill.style.width      = barWidth + '%';
    fill.style.background = color;
    void fill.offsetWidth;
    fill.style.transition = '';

    // % de morir label stays as the actual death probability
    if (pct) {
      pct.textContent = probPct + '%';
      pct.style.color = prob >= 0.50 ? 'var(--red)' : 'var(--t1)';
    }
    if (icon) {
      if      (prob < 0.10) icon.textContent = '🔋';
      else if (prob < 0.25) icon.textContent = '🪫';
      else if (prob < 0.50) icon.textContent = '⚠️';
      else                  icon.textContent = '💀';
    }
    fill.classList.remove('flash','critical');
    void fill.offsetWidth;
    if (flash) fill.classList.add('flash');
    if (barWidth <= 10) fill.classList.add('critical');
  });
}

// ── AUTO-JOIN FROM URL ──────────────────────────
(function autoJoinFromURL() {
  const code = getCodeFromURL();
  if (code && code.length === 5) {
    pendingJoinCode = code;
  }
  render();
})();
</script>
